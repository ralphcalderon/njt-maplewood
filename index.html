<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  
  :root {
    --bg: #0a0e17;
    --surface: #131926;
    --accent: #3b82f6;
    --accent-bright: #60a5fa;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --orange: #f59e0b;
    --orange-dim: rgba(245,158,11,0.10);
    --cyan: #06b6d4;
    --cyan-dim: rgba(6,182,212,0.10);
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #475569;
    --border: #1e293b;
    --njt-blue: #003DA5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, var(--bg) 0%, #0d1220 100%);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .status-bar { height: env(safe-area-inset-top, 48px); }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .njt-badge {
    background: var(--njt-blue); color: #fff; font-weight: 700;
    font-size: 13px; letter-spacing: 0.05em; padding: 6px 10px;
    border-radius: 6px; font-family: 'JetBrains Mono', monospace;
  }
  .header-text { flex: 1; }
  .line-name { font-size: 17px; font-weight: 600; }
  .schedule-type { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; font-weight: 500; color: var(--text-dim);
  }

  /* Direction toggle */
  .direction-toggle {
    display: flex; align-items: center; justify-content: space-between;
    width: calc(100% - 40px); margin: 18px auto 0; padding: 16px 22px;
    background: linear-gradient(135deg, rgba(0,61,165,0.87), rgba(0,61,165,0.6));
    border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
    cursor: pointer; color: #fff;
    box-shadow: 0 4px 20px rgba(0,61,165,0.25);
    font-family: 'DM Sans', sans-serif;
    transition: transform 0.1s ease;
  }
  .direction-toggle:active { transform: scale(0.98); }
  .direction-from, .direction-to { font-size: 17px; font-weight: 600; flex: 1; }
  .direction-from { text-align: left; }
  .direction-to { text-align: right; }
  .arrow-container {
    display: flex; flex-direction: column; align-items: center; gap: 1px; padding: 0 6px;
  }
  .tap-hint {
    font-size: 8px; opacity: 0.45; text-transform: uppercase;
    letter-spacing: 0.12em; font-weight: 500;
  }

  /* Filter row */
  .filter-row {
    display: flex; gap: 8px; padding: 12px 20px 4px; justify-content: center;
  }
  .filter-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 14px; color: var(--text-dim); font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s ease;
  }
  .filter-btn.active {
    background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.3);
    color: var(--accent-bright);
  }

  /* Train list */
  .train-list {
    padding: 8px 20px; display: flex; flex-direction: column; gap: 10px;
  }

  /* Train card */
  .train-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    animation: slideUp 0.35s ease both;
  }
  .train-card.next {
    border-color: rgba(34,197,94,0.25);
    background: linear-gradient(135deg, var(--surface), rgba(34,197,94,0.04));
    box-shadow: 0 2px 16px rgba(34,197,94,0.08);
  }

  .card-left {
    display: flex; flex-direction: column; align-items: center;
    min-width: 66px; gap: 5px;
  }
  .countdown {
    font-family: 'JetBrains Mono', monospace;
    font-size: 19px; font-weight: 600; color: var(--accent-bright);
  }
  .countdown.next {
    font-size: 22px; color: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  .badge {
    font-size: 9px; font-weight: 600; padding: 2px 7px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge.direct { background: var(--green-dim); color: var(--green); }
  .badge.transfer { background: var(--orange-dim); color: var(--orange); }

  .card-middle { flex: 1; min-width: 0; }
  .time-row { display: flex; align-items: center; gap: 7px; }
  .depart-time { font-size: 15px; font-weight: 600; }
  .time-dash { font-size: 12px; color: var(--text-muted); }
  .arrive-time { font-size: 15px; font-weight: 500; color: var(--text-dim); }
  .train-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .train-number {
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .line-badge {
    font-size: 10px; color: var(--cyan); background: var(--cyan-dim);
    padding: 1px 6px; border-radius: 3px; font-weight: 500;
  }
  .transfer-note { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-style: italic; }

  .card-right { display: flex; flex-direction: column; align-items: flex-end; }
  .duration {
    font-size: 13px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; font-weight: 500;
  }

  /* Show more */
  .show-more-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px; color: var(--accent-bright); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; width: 100%;
    transition: all 0.15s ease;
  }
  .show-more-btn:active { background: rgba(59,130,246,0.08); }

  /* No trains */
  .no-trains { text-align: center; padding: 48px 20px; }
  .no-trains-icon { font-size: 40px; margin-bottom: 12px; }
  .no-trains-text { font-size: 18px; font-weight: 600; color: var(--text-dim); }
  .no-trains-sub { font-size: 14px; color: var(--text-muted); margin-top: 8px; }

  /* Footer */
  .footer { padding: 28px 20px calc(32px + env(safe-area-inset-bottom, 0px)); text-align: center; }
  .footer-note { font-size: 12px; color: var(--orange); font-weight: 500; margin-bottom: 4px; }
  .footer-sub { font-size: 11px; color: var(--text-muted); }
  .footer-version { font-size: 10px; color: var(--text-muted); margin-top: 10px; opacity: 0.5; }
  /* Real-time status */
  .rt-status {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 20px 0; justify-content: center;
  }
  .rt-dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block;
  }
  .rt-dot.live { background: var(--green); animation: pulse 2s ease-in-out infinite; }
  .rt-dot.offline { background: var(--text-muted); }
  .rt-label { font-size: 11px; color: var(--text-muted); }
  
  .delay-badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 4px; margin-top: 3px; display: inline-block;
  }
  .delay-badge.late { background: rgba(239,68,68,0.12); color: #ef4444; }
  .delay-badge.on-time { background: var(--green-dim); color: var(--green); }
  .delay-badge.cancelled { background: rgba(239,68,68,0.15); color: #ef4444; text-decoration: line-through; }
</style>

let realtimeTimestamp = 0;

// ─── REAL-TIME FETCHING ──────────────────────────────────────────
async function fetchRealtime() {
  try {
    const res = await fetch("/.netlify/functions/njt-realtime");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    realtimeData = data;
    realtimeTimestamp = Date.now();
    
    // Update status indicator
    document.getElementById("rtDot").className = "rt-dot live";
    document.getElementById("rtLabel").textContent = 
      "Live data • " + data.debug.totalEntities + " trains tracked";
    
    render();
  } catch (err) {
    console.log("Realtime fetch failed (using static):", err.message);
    document.getElementById("rtDot").className = "rt-dot offline";
    document.getElementById("rtLabel").textContent = "Static schedule";
  }
}

function getDelayForTrain(train) {
  if (!realtimeData || !realtimeData.trips) return null;
  // Realtime data is fresh for 2 minutes
  if (Date.now() - realtimeTimestamp > 120000) return null;
  
  // Try matching by train number
  const match = realtimeData.trips.find(rt => {
    const tid = rt.tripId || "";
    return tid.includes(train.train);
  });
  
  if (!match) return null;
  
  return {
    delayMinutes: Math.round((match.departureDelay || match.arrivalDelay || 0) / 60),
    cancelled: match.cancelled || false,
  };
}

// ─── HELPERS ─────────────────────────────────────────────────────
function parseTime(str) {
  const [h, m] = str.split(":").map(Number);
  return h * 60 + m;
}

function formatTime12(str) {
  let [h, m] = str.split(":").map(Number);
  const ampm = (h >= 12 && h < 24) ? "PM" : "AM";
  if (h === 0) h = 12;
  else if (h > 12) h -= 12;
  return h + ":" + String(m).padStart(2, "0") + " " + ampm;
}

function minutesUntil(departStr, nowMins) {
  let dep = parseTime(departStr);
  if (dep < 240 && nowMins > 1200) dep += 1440;
  if (dep < nowMins && nowMins < 240) return dep + 1440 - nowMins;
  return dep - nowMins;
}

function formatCountdown(mins) {
  if (mins <= 0) return "NOW";
  if (mins < 60) return mins + "m";
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? h + "h " + m + "m" : h + "h";
}

// ─── RENDER ──────────────────────────────────────────────────────
function render() {
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();

  // Clock
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

  // Direction labels
  const from = direction === "toPenn" ? "Maplewood" : "NY Penn";
  const to = direction === "toPenn" ? "NY Penn" : "Maplewood";
  document.getElementById("fromStation").textContent = from;
  document.getElementById("toStation").textContent = to;

  // Filter buttons
  document.getElementById("filterAll").className = "filter-btn" + (directOnly ? "" : " active");
  document.getElementById("filterDirect").className = "filter-btn" + (directOnly ? " active" : "");

  // Get trains
  let trains = SCHEDULE[direction];
  if (directOnly) trains = trains.filter(t => !t.transfer);

  const upcoming = trains
    .map(t => ({ ...t, minsAway: minutesUntil(t.depart, nowMins) }))
    .filter(t => t.minsAway >= -1 && t.minsAway < 1440)
    .sort((a, b) => a.minsAway - b.minsAway);

  const display = showAll ? upcoming : upcoming.slice(0, 3);
  const list = document.getElementById("trainList");

  if (display.length === 0) {
    const firstTrain = SCHEDULE[direction][0];
    list.innerHTML = `
      <div class="no-trains">
        <div class="no-trains-icon">🌙</div>
        <div class="no-trains-text">${directOnly ? "No direct trains remaining" : "No more trains today"}</div>
        <div class="no-trains-sub">First train: ${formatTime12(firstTrain.depart)}</div>
      </div>`;
    return;
  }

  let html = "";
  display.forEach((train, i) => {
    const isNext = i === 0 && !showAll;
    const isDirect = !train.transfer;
    const rt = getDelayForTrain(train);
    
    let delayHtml = "";
    if (rt) {
      if (rt.cancelled) {
        delayHtml = `<div class="delay-badge cancelled">Cancelled</div>`;
      } else if (rt.delayMinutes > 2) {
        delayHtml = `<div class="delay-badge late">${rt.delayMinutes}m late</div>`;
      } else if (rt.delayMinutes >= 0) {
        delayHtml = `<div class="delay-badge on-time">On time</div>`;
      }
    }
    
    html += `
      <div class="train-card${isNext ? ' next' : ''}${rt && rt.cancelled ? ' cancelled' : ''}" style="animation-delay:${i * 0.05}s">
        <div class="card-left">
          <div class="countdown${isNext ? ' next' : ''}">${formatCountdown(train.minsAway)}</div>
          <div class="badge ${isDirect ? 'direct' : 'transfer'}">${isDirect ? 'Direct' : 'Transfer'}</div>
        </div>
        <div class="card-middle">
          <div class="time-row">
            <span class="depart-time">${formatTime12(train.depart)}</span>
            <span class="time-dash">→</span>
            <span class="arrive-time">${formatTime12(train.arrive)}</span>
          </div>
          <div class="train-meta">
            <span class="train-number">#${train.train}</span>
            <span class="line-badge">${train.line}</span>
          </div>
          ${train.transfer ? `<div class="transfer-note">${train.transfer}</div>` : ''}
          ${delayHtml}
        </div>
        <div class="card-right">
          <div class="duration">${train.duration}m</div>
        </div>
      </div>`;
  });

  if (upcoming.length > 3) {
    html += `
      <button class="show-more-btn" onclick="toggleShowAll()">
        ${showAll ? 'Show next 3 only' : 'Show all ' + upcoming.length + ' remaining'}
      </button>`;
  }

  list.innerHTML = html;
}

// ─── INTERACTIONS ────────────────────────────────────────────────
function toggleDirection() {
  direction = direction === "toPenn" ? "toMaplewood" : "toPenn";
  showAll = false;
  render();
}

function setFilter(direct) {
  directOnly = direct;
  showAll = false;
  render();
}

function toggleShowAll() {
  showAll = !showAll;
  render();
}

// ─── GPS LOCATION ────────────────────────────────────────────────
const MAPLEWOOD = { lat: 40.7331, lng: -74.2746 };
const PENN_NYC  = { lat: 40.7505, lng: -73.9934 };

function distanceMiles(lat1, lng1, lat2, lng2) {
  const R = 3959; // Earth radius in miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function setDirectionFromLocation(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const toMaple = distanceMiles(lat, lng, MAPLEWOOD.lat, MAPLEWOOD.lng);
  const toPenn  = distanceMiles(lat, lng, PENN_NYC.lat, PENN_NYC.lng);
  // If closer to Maplewood, you want to go to Penn (and vice versa)
  direction = toMaple < toPenn ? "toPenn" : "toMaplewood";
  render();
}

// ─── INIT ────────────────────────────────────────────────────────
// Try GPS first, fall back to time-of-day
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    setDirectionFromLocation,
    () => render(),
    { timeout: 5000, maximumAge: 300000 }
  );
}
render();
setInterval(render, 15000);

// Start real-time polling (every 30 seconds)
fetchRealtime();
setInterval(fetchRealtime, 30000);
</script>
