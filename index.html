<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;min-height:100dvh;max-width:430px;margin:0 auto;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background-color .15s ease,color .15s ease}
  :root{--mono:'Space Mono','Courier New',monospace;--sans:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif}
  body,body.mood-outbound{--bg:#0c0c0e;--surface:#161618;--surface-up:#1c1c20;--text:#c8c8be;--text-dim:#6e6e66;--text-muted:#44443e;--border:#26262a;--accent:#8a9ab4;--accent-dim:rgba(138,154,180,.08);--accent-mid:rgba(138,154,180,.22);--accent-bright:#a0b4d0;--green:#68a898;--green-dim:rgba(104,168,152,.12);--red:#c87070;--red-dim:rgba(200,112,112,.12);--amber:#b8a468;--amber-dim:rgba(184,164,104,.1);--blue:#7090b8;--blue-dim:rgba(112,144,184,.1);--card-next-bg:linear-gradient(135deg,#161618,rgba(138,154,180,.04));--card-next-border:rgba(138,154,180,.18);--toggle-bg:#161618;--scanline:rgba(0,0,0,.025);background-color:var(--bg);color:var(--text)}
  body.mood-inbound{--bg:#f5f0e8;--surface:#ebe5d8;--surface-up:#e0d9ca;--text:#2c2820;--text-dim:#6e6860;--text-muted:#a09888;--border:#d5ccbc;--accent:#c8862a;--accent-dim:rgba(200,134,42,.1);--accent-mid:rgba(200,134,42,.25);--accent-bright:#d4962e;--green:#4a9e6a;--green-dim:rgba(74,158,106,.12);--red:#c85050;--red-dim:rgba(200,80,80,.1);--amber:#b8862a;--amber-dim:rgba(184,134,42,.1);--blue:#5080a8;--blue-dim:rgba(80,128,168,.1);--card-next-bg:linear-gradient(135deg,#ebe5d8,rgba(200,134,42,.06));--card-next-border:rgba(200,134,42,.25);--toggle-bg:#ebe5d8;--scanline:rgba(255,255,255,.02);background-color:var(--bg);color:var(--text)}
  body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px);pointer-events:none;z-index:9999}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes fadeInSlow{from{opacity:0}to{opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
  .status-bar{height:env(safe-area-inset-top,44px)}
  .setup-screen{padding:0 24px;animation:fadeIn .5s ease;min-height:calc(100vh - 60px);display:flex;flex-direction:column}
  .splash-logo{text-align:center;padding:24px 0 0;animation:fadeIn .8s ease}
  .splash-logo img{width:280px;max-width:75vw;height:auto;border-radius:4px}
  .setup-instruction{text-align:center;margin:24px 0 28px;animation:fadeInSlow 1s ease .3s both}
  .setup-instruction-text{font-family:var(--sans);font-size:15px;font-weight:400;color:var(--text-dim);line-height:1.5;max-width:300px;margin:0 auto}
  .setup-section{animation:slideUp .5s ease .5s both}
  .setup-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;margin-top:20px}
  .station-select-wrap{position:relative}
  .station-search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-family:var(--sans);font-size:16px;font-weight:500;outline:none;transition:border-color .15s}
  .station-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
  .station-search::placeholder{color:var(--text-muted);font-weight:400}
  .station-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface-up);border:1px solid var(--border);border-radius:10px;margin-top:4px;max-height:220px;overflow-y:auto;z-index:100;display:none;box-shadow:0 8px 32px rgba(0,0,0,.3)}
  .station-dropdown.open{display:block}
  .station-option{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
  .station-option:last-child{border-bottom:none}
  .station-option:hover,.station-option:active{background:var(--accent-dim)}
  .station-option-name{font-size:15px;font-weight:500;color:var(--text)}
  .station-option-line{font-size:11px;color:var(--text-dim);font-family:var(--mono);margin-top:2px}
  .setup-swap{display:flex;justify-content:center;margin:8px 0 -4px}
  .swap-btn{background:var(--surface);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);transition:all .15s}
  .swap-btn:hover{border-color:var(--accent);color:var(--accent)}
  .setup-go{margin-top:28px;width:100%;padding:16px;background:var(--text-muted);color:var(--bg);border:none;border-radius:10px;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;opacity:.25;pointer-events:none}
  .setup-go.ready{opacity:1;pointer-events:auto;background:#c5e868;color:#0c0c0e}
  .setup-go.ready:active{transform:scale(.98);opacity:.9}
  .setup-footer-text{font-family:var(--mono);font-size:9px;color:var(--text-muted);text-align:center;margin-top:auto;padding:24px 0 calc(16px + env(safe-area-inset-bottom,0px));line-height:1.6}
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:0 32px;animation:fadeIn .3s ease}
  .loading-logo{margin-bottom:32px}
  .loading-logo img{width:220px;max-width:60vw;height:auto;border-radius:4px}
  .loading-quote{font-family:var(--mono);font-size:12px;color:var(--text-dim);text-align:center;line-height:1.6;font-style:italic}
  .loading-dots::after{content:'';animation:dots 1.5s steps(4) infinite}
  .app-screen{animation:fadeIn .15s ease}
  .header{display:flex;align-items:center;gap:12px;padding:0 20px 14px;border-bottom:1px solid var(--border);transition:border-color .15s}
  .header-logo img{width:40px;height:40px;border-radius:8px;object-fit:cover}
  .header-text{flex:1}
  .header-title{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.5px}
  .header-mood{font-family:var(--mono);font-size:9px;color:var(--text-muted);letter-spacing:.5px;font-style:italic;margin-top:2px}
  .header-right{display:flex;align-items:center;gap:10px}
  .clock{font-family:var(--mono);font-size:13px;color:var(--text-dim)}
  .settings-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;transition:color .15s}
  .settings-btn:hover{color:var(--text)}
  .direction-toggle{display:flex;align-items:center;justify-content:space-between;width:calc(100% - 40px);margin:16px auto 0;padding:16px 20px;background:var(--toggle-bg);border:1px solid var(--border);border-radius:12px;cursor:pointer;color:var(--text);font-family:var(--sans);transition:all .15s ease;position:relative;overflow:hidden}
  .direction-toggle::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--accent-dim),transparent);transition:opacity .15s}
  .direction-toggle:active{transform:scale(.98)}
  .direction-from,.direction-to{font-size:16px;font-weight:600;flex:1;position:relative;z-index:1}
  .direction-from{text-align:left}.direction-to{text-align:right}
  .arrow-container{display:flex;flex-direction:column;align-items:center;gap:1px;padding:0 8px;position:relative;z-index:1}
  .arrow-container svg path{stroke:var(--text);transition:stroke .15s}
  .tap-hint{font-family:var(--mono);font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px}
  .filter-row{display:flex;gap:6px;padding:10px 20px 0;justify-content:center}
  .filter-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;color:var(--text-muted);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
  .filter-btn.active{background:var(--accent-dim);border-color:var(--accent-mid);color:var(--accent-bright)}
  .rt-status{display:flex;align-items:center;gap:6px;padding:10px 20px 0;justify-content:center}
  .rt-dot{width:6px;height:6px;border-radius:50%;transition:background .15s}
  .rt-dot.live{background:var(--green);animation:pulse 2s ease-in-out infinite}
  .rt-dot.offline{background:var(--text-muted)}
  .rt-label{font-family:var(--mono);font-size:10px;color:var(--text-muted)}
  .train-list{padding:10px 20px;display:flex;flex-direction:column;gap:8px}
  .train-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;animation:slideUp .3s ease both;transition:background .15s,border-color .15s}
  .train-card.next{border-color:var(--card-next-border);background:var(--card-next-bg)}
  .card-left{display:flex;flex-direction:column;align-items:center;min-width:60px;gap:5px}
  .countdown{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text)}
  .countdown.next{font-size:20px;color:var(--accent-bright);animation:pulse 2.5s ease-in-out infinite}
  .badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
  .badge.direct{background:var(--green-dim);color:var(--green)}
  .badge.transfer{background:var(--amber-dim);color:var(--amber)}
  .card-middle{flex:1;min-width:0}
  .time-row{display:flex;align-items:center;gap:7px}
  .depart-time{font-size:15px;font-weight:600}
  .time-dash{font-size:12px;color:var(--text-muted)}
  .arrive-time{font-size:15px;font-weight:500;color:var(--text-dim)}
  .train-meta{display:flex;align-items:center;gap:8px;margin-top:4px}
  .train-number{font-family:var(--mono);font-size:10px;color:var(--text-muted)}
  .line-badge{font-family:var(--mono);font-size:10px;color:var(--blue);background:var(--blue-dim);padding:1px 6px;border-radius:3px}
  .transfer-note{font-size:10px;color:var(--text-muted);margin-top:3px;font-style:italic}
  .card-right{display:flex;flex-direction:column;align-items:flex-end}
  .duration{font-family:var(--mono);font-size:12px;color:var(--text-dim)}
  .delay-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-top:3px;display:inline-block}
  .delay-badge.late{background:var(--red-dim);color:var(--red)}
  .delay-badge.on-time{background:var(--green-dim);color:var(--green)}
  .delay-badge.cancelled{background:var(--red-dim);color:var(--red);text-decoration:line-through}
  .show-more-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--text-dim);font-family:var(--mono);font-size:12px;cursor:pointer;width:100%;transition:all .15s}
  .show-more-btn:active{background:var(--accent-dim)}
  .no-trains{text-align:center;padding:48px 20px}
  .no-trains-icon{font-size:32px;margin-bottom:12px;opacity:.6}
  .no-trains-text{font-family:var(--mono);font-size:14px;color:var(--text-dim)}
  .no-trains-sub{font-size:13px;color:var(--text-muted);margin-top:8px}
  .footer{padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));text-align:center}
  .footer-note{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:4px}
  .footer-sub{font-family:var(--mono);font-size:10px;color:var(--text-muted)}
  .footer-version{font-family:var(--mono);font-size:9px;color:var(--text-muted);margin-top:10px;opacity:.5}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

function renderApp(){applyMood();const from=direction==="outbound"?homeStation:workStation,to=direction==="outbound"?workStation:homeStation;const moodLabel=direction==="outbound"?"into the machine":"homeward bound";document.getElementById("app").innerHTML=`<div class="app-screen"><div class="header"><div class="header-logo"><img src="${LOGO_ICON}" alt="OK Commuter"></div><div class="header-text"><div class="header-title">OK Commuter</div><div class="header-mood">${moodLabel}</div></div><div class="header-right"><div class="clock" id="clock"></div><button class="settings-btn" onclick="resetConfig()" title="Change stations"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m8.66-17.66l-1.42 1.42M4.76 19.24l-1.42 1.42M23 12h-2M3 12H1m17.66 8.66l-1.42-1.42M4.76 4.76L3.34 3.34"/></svg></button></div></div><button class="direction-toggle" onclick="toggleDirection()"><div class="direction-from" id="fromStation">${from.name}</div><div class="arrow-container"><svg width="28" height="28" viewBox="0 0 32 32" fill="none"><path d="M8 16H24M24 16L18 10M24 16L18 22" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><div class="tap-hint">tap to flip</div></div><div class="direction-to" id="toStation">${to.name}</div></button><div class="filter-row"><button class="filter-btn${!directOnly?' active':''}" id="filterAll" onclick="setFilter(false)">All</button><button class="filter-btn${directOnly?' active':''}" id="filterDirect" onclick="setFilter(true)">Direct</button></div><div class="filter-row" style="padding-top:4px"><button class="filter-btn${scheduleType==='weekday'?' active':''}" onclick="setScheduleType('weekday')">Wkdy</button><button class="filter-btn${scheduleType==='weekend'?' active':''}" onclick="setScheduleType('weekend')">Wknd</button><button class="filter-btn${scheduleType==='holiday'?' active':''}" onclick="setScheduleType('holiday')">Hol</button></div><div class="rt-status"><span class="rt-dot offline" id="rtDot"></span><span class="rt-label" id="rtLabel">Static schedule</span></div><div class="train-list" id="trainList"></div><div class="footer"><div class="footer-note" id="footerNote">Static schedule — check NJT app for real-time</div><div class="footer-sub" id="footerSub">njtransit.com for official status</div><div class="footer-version">OK Commuter v4.0 · no alarms and no surprises</div></div></div>`;render();}
function render(){if(currentScreen!=="app")return;const now=new Date(),nowMins=now.getHours()*60+now.getMinutes();const c=document.getElementById("clock");if(c)c.textContent=now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});const from=direction==="outbound"?homeStation:workStation,to=direction==="outbound"?workStation:homeStation;const fe=document.getElementById("fromStation"),te=document.getElementById("toStation");if(fe)fe.textContent=from.name;if(te)te.textContent=to.name;let trains=SCHEDULE[direction]||[];if(directOnly)trains=trains.filter(t=>!t.transfer);const upcoming=trains.map(t=>({...t,minsAway:minutesUntil(t.depart,nowMins)})).filter(t=>t.minsAway>=-1&&t.minsAway<1440).sort((a,b)=>a.minsAway-b.minsAway);const display=showAll?upcoming:upcoming.slice(0,3);const list=document.getElementById("trainList");if(!list)return;if(!scheduleLoaded){list.innerHTML=`<div class="no-trains"><div class="no-trains-icon">📡</div><div class="no-trains-text">Schedule not yet available for this route</div><div class="no-trains-sub">More stations coming soon. Schedules currently available for Maplewood ↔ NY Penn.</div></div>`;return;}if(display.length===0){const ft=(SCHEDULE[direction]||[])[0];list.innerHTML=`<div class="no-trains"><div class="no-trains-icon">🌙</div><div class="no-trains-text">${directOnly?"No direct trains remaining":"No more trains today"}</div><div class="no-trains-sub">${ft?"First train: "+formatTime12(ft.depart):"Check back tomorrow"}</div></div>`;return;}let html="";display.forEach((train,i)=>{const isNext=i===0&&!showAll,isDirect=!train.transfer,rt=getDelayForTrain(train);let dh="";if(rt){if(rt.cancelled)dh='<div class="delay-badge cancelled">Cancelled</div>';else if(rt.delayMinutes>2)dh=`<div class="delay-badge late">${rt.delayMinutes}m late</div>`;else if(rt.delayMinutes>=0)dh='<div class="delay-badge on-time">On time</div>';}html+=`<div class="train-card${isNext?' next':''}" style="animation-delay:${i*.06}s"><div class="card-left"><div class="countdown${isNext?' next':''}">${formatCountdown(train.minsAway)}</div><div class="badge ${isDirect?'direct':'transfer'}">${isDirect?'Direct':'Xfer'}</div></div><div class="card-middle"><div class="time-row"><span class="depart-time">${formatTime12(train.depart)}</span><span class="time-dash">→</span><span class="arrive-time">${formatTime12(train.arrive)}</span></div><div class="train-meta"><span class="train-number">#${train.train}</span><span class="line-badge">${train.line}</span></div>${train.transfer?`<div class="transfer-note">${train.transfer}</div>`:''}${dh}</div><div class="card-right"><div class="duration">${train.duration}m</div></div></div>`;});if(upcoming.length>3)html+=`<button class="show-more-btn" onclick="toggleShowAll()">${showAll?'Show next 3':'Show all '+upcoming.length+' remaining'}</button>`;list.innerHTML=html;}
function toggleDirection(){direction=direction==="outbound"?"inbound":"outbound";showAll=false;realtimeData=null;applyMood();renderApp();fetchRealtime();}
function setFilter(d){directOnly=d;showAll=false;document.getElementById("filterAll").className="filter-btn"+(d?"":" active");document.getElementById("filterDirect").className="filter-btn"+(d?" active":"");render();}
function setScheduleType(t){scheduleType=t;showAll=false;renderApp();}
function toggleShowAll(){showAll=!showAll;render();}
function resetConfig(){if(confirm("Change your commute stations?")){document.body.className="";renderSetup();}}
if(loadConfig()){direction=new Date().getHours()<12?"outbound":"inbound";applyMood();showLoading(()=>{loadSchedule();initApp();});}else{renderSetup();}
</script>
</body>
</html>
